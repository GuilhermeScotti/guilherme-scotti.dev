name: Deploy CV to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare deployment (cv at /cv)
        run: |
          mkdir -p publish/cv
          cp cv/index.html cv/index-pt.html cv/styles.css cv/favicon.ico cv/favicon-96x96.png publish/cv/
          cp cv/favicon.ico cv/favicon-96x96.png publish/
          echo '<!DOCTYPE html><html><head><meta charset="UTF-8"><link rel="icon" type="image/x-icon" href="favicon.ico" /><link rel="icon" type="image/png" sizes="96x96" href="favicon-96x96.png" /><meta http-equiv="refresh" content="0;url=cv/"><script>location.replace("cv/")</script></head><body><a href="cv/">CV</a></body></html>' > publish/index.html

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: publish

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
